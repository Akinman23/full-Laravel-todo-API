[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.curl", "composer"]

[phases.build]
cmds = [
  "mkdir -p bootstrap/cache storage/logs storage/framework/cache/data storage/framework/sessions storage/framework/views",
  "chmod -R 777 bootstrap/cache storage",
  "composer install --no-dev --optimize-autoloader --no-scripts",
  "touch database/database.sqlite",
  "cp .env.example .env",
  "php artisan key:generate",
  "php artisan package:discover --ansi"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
